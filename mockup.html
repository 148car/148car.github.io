<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美美子 w. 媽 TOKYO TRIP — Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background: linear-gradient(145deg, #0d0d1a 0%, #1a1230 40%, #0d1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .glow-1 {
      position: fixed; top: -150px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(120,80,220,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .glow-2 {
      position: fixed; bottom: -150px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(220,80,120,0.14) 0%, transparent 70%);
      pointer-events: none;
    }

    .title-tag {
      margin-bottom: 20px;
      text-align: center;
      z-index: 10;
      flex-shrink: 0;
    }
    .title-tag h1 {
      font-size: 18px; font-weight: 800;
      color: white; letter-spacing: 0.3px; margin-bottom: 4px;
    }
    .title-tag p {
      font-size: 11px; color: rgba(255,255,255,0.38);
      letter-spacing: 2.5px; text-transform: uppercase;
    }

    /* Scene scales dynamically via JS */
    .scene {
      position: relative;
      z-index: 10;
      transform-origin: top center;
      filter: drop-shadow(0 40px 80px rgba(0,0,0,0.75))
              drop-shadow(0 0 40px rgba(120,80,255,0.2));
    }

    /* Fixed device dimensions — JS scales the .scene to fit */
    .device {
      position: relative;
      width: 414px;
      height: 855px;
    }

    .device iframe {
      position: absolute;
      top: 15px; left: 15px;
      width: 384px; height: 825px;
      border: none;
      border-radius: 44px;
      display: block;
      background: #fff;
    }

    .frame-svg {
      position: absolute;
      top: 0; left: 0;
      width: 414px; height: 855px;
      pointer-events: none;
      z-index: 5;
    }

    .status-bar {
      position: absolute;
      top: 15px; left: 15px;
      width: 384px; height: 54px;
      border-radius: 44px 44px 0 0;
      background: white;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 32px 10px;
      z-index: 6;
      pointer-events: none;
    }
    .status-time { font-size: 15px; font-weight: 700; color: #000; letter-spacing: -0.3px; }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    .dynamic-island {
      position: absolute;
      top: 28px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 36px;
      background: #000; border-radius: 20px;
      z-index: 8; pointer-events: none;
    }

    .home-bar {
      position: absolute;
      bottom: 22px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      background: rgba(0,0,0,0.28); border-radius: 10px;
      z-index: 8; pointer-events: none;
    }

    /* Physical buttons */
    .btn-action {
      position: absolute; left: -5px; top: 148px;
      width: 5px; height: 34px;
      background: linear-gradient(to right, #2a2a2c, #3e3e40);
      border-radius: 3px 0 0 3px;
      box-shadow: -1px 0 2px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn-vol-up {
      position: absolute; left: -5px; top: 196px;
      width: 5px; height: 64px;
      background: linear-gradient(to right, #2a2a2c, #3e3e40);
      border-radius: 3px 0 0 3px;
      box-shadow: -1px 0 2px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn-vol-down {
      position: absolute; left: -5px; top: 270px;
      width: 5px; height: 64px;
      background: linear-gradient(to right, #2a2a2c, #3e3e40);
      border-radius: 3px 0 0 3px;
      box-shadow: -1px 0 2px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn-power {
      position: absolute; right: -5px; top: 190px;
      width: 5px; height: 90px;
      background: linear-gradient(to left, #2a2a2c, #3e3e40);
      border-radius: 0 3px 3px 0;
      box-shadow: 1px 0 2px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .caption {
      margin-top: 18px;
      text-align: center;
      z-index: 10;
      flex-shrink: 0;
    }
    .caption p {
      font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 2px;
    }
  </style>
</head>
<body>

    </div>
  </div>

  <div class="caption">
    <p>✦ &nbsp; WBC 2026 &nbsp; ✦ &nbsp; TOKYO &nbsp; ✦</p>
  </div>

  <script>
    function fitPhone() {
      const PHONE_H = 855;
      const PHONE_W = 414;
      // reserve space for title (~70px) + margins (20+18px) + caption (~30px)
      const reservedH = 70 + 20 + 18 + 30;
      const reservedW = 40;
      const maxH = window.innerHeight - reservedH;
      const maxW = window.innerWidth - reservedW;
      const scaleByH = maxH / PHONE_H;
      const scaleByW = maxW / PHONE_W;
      const scale = Math.min(scaleByH, scaleByW, 1);
      document.querySelector('.scene').style.transform = `scale(${scale})`;
      // compensate margin so caption stays close
      const shrink = PHONE_H * (1 - scale);
      document.querySelector('.scene').style.marginBottom = `-${shrink}px`;
    }
    fitPhone();
    window.addEventListener('resize', fitPhone);
  </script>
</body>
</html>
