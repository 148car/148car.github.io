<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>IELTS 口說每日複習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.6;font-size:16px}
.app{max-width:680px;margin:0 auto;padding:16px;padding-bottom:calc(120px + env(safe-area-inset-bottom))}
header{padding:16px 4px 24px}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{color:#86868b;font-size:14px}
.stats{display:flex;gap:12px;margin-top:14px}
.stat{flex:1;background:#fff;border-radius:12px;padding:12px 14px}
.stat .num{font-size:22px;font-weight:600}
.stat .lbl{font-size:12px;color:#86868b;margin-top:2px}
.section-title{font-size:13px;font-weight:600;color:#86868b;text-transform:uppercase;letter-spacing:.5px;margin:20px 4px 10px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;border:1px solid transparent;transition:transform .1s}
.card:active{transform:scale(.98)}
.card .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#eef;color:#446;font-weight:600;margin-right:6px}
.card .tag.p2{background:#fee;color:#a44}
.card .tag.p3{background:#efe;color:#484}
.card .story-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;background:#fef3c7;color:#92400e;font-weight:500;margin-left:4px}
.story-box{background:#fef3c7;border-radius:12px;padding:12px 14px;margin-top:14px;font-size:13px;color:#78350f}
.story-box .label{font-weight:600;margin-bottom:6px;display:block}
.story-box .links a{display:inline-block;background:#fff;color:#78350f;padding:4px 10px;border-radius:8px;margin:3px 4px 0 0;text-decoration:none;font-size:12px}
.story-box .links a:active{background:#fde68a}
.card .topic{font-size:15px;font-weight:600;margin-bottom:4px;margin-top:4px}
.card .prompt{font-size:13px;color:#86868b;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:11px;color:#a8a8ad;margin-top:8px;display:flex;gap:10px}
.card.due{border-left:3px solid #ff9500}
.empty{text-align:center;color:#86868b;padding:30px;background:#fff;border-radius:14px}

/* Card detail overlay */
.overlay{position:fixed;inset:0;background:#f5f5f7;z-index:100;overflow-y:auto;display:none;flex-direction:column}
.overlay.show{display:flex}
.overlay header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:1}
.icon-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:6px 10px;color:#1d1d1f}
.overlay-title{flex:1;font-size:15px;font-weight:600}
.detail{padding:18px;flex:1;max-width:680px;width:100%;margin:0 auto}
.prompt-box{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:14px;border-left:3px solid #007aff}
.prompt-box .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#eef;color:#446;font-weight:600;margin-bottom:8px}
.prompt-box .topic{font-size:18px;font-weight:600;margin-bottom:6px}
.prompt-box .q{font-size:14px;color:#3a3a3c;line-height:1.6}
.prompt-box .kw{font-size:12px;color:#86868b;margin-top:8px;background:#f5f5f7;padding:8px 10px;border-radius:8px}

.reveal-btn{display:block;width:100%;padding:16px;background:#007aff;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;margin:16px 0;font-family:inherit}
.reveal-btn:active{transform:scale(.98)}

.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar button{flex:1;min-width:64px;padding:10px;background:#fff;border:1px solid #e5e5ea;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;color:#1d1d1f}
.toolbar button.active{background:#1d1d1f;color:#fff;border-color:#1d1d1f}

.answer{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px}
.answer p{margin-bottom:10px;font-size:16px;line-height:1.7}
.answer p.cn{color:#3a3a3c;font-size:15px}
.answer p.en{color:#1d1d1f}
.answer .row{padding:12px 0;border-bottom:1px solid #f0f0f5}
.answer .row:last-child{border-bottom:none}
.answer .row .en{margin-bottom:6px}
.answer .row .cn{font-size:14px;color:#86868b;margin:0}

.diff-bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #e5e5ea;padding:12px 16px calc(16px + env(safe-area-inset-bottom));display:none;gap:8px;z-index:110}
.diff-bar.show{display:flex}
.diff-bar button{flex:1;padding:14px 8px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.diff-easy{background:#34c759;color:#fff}
.diff-mid{background:#ffcc00;color:#1d1d1f}
.diff-hard{background:#ff3b30;color:#fff}
.diff-bar button:active{transform:scale(.96)}

.tts-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;padding:6px 10px;background:#f5f5f7;border:none;border-radius:8px;cursor:pointer;color:#007aff;font-family:inherit;margin-bottom:12px}
.tts-btn:hover{background:#e5e5ea}

.tab-bar{display:flex;background:#fff;border-radius:12px;padding:4px;margin-bottom:14px}
.tab-bar button{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:#86868b;font-weight:500}
.tab-bar button.active{background:#1d1d1f;color:#fff}

.reset-btn{margin-top:30px;padding:10px;background:none;border:1px solid #e5e5ea;border-radius:10px;color:#86868b;font-size:13px;cursor:pointer;width:100%;font-family:inherit}
</style>
</head>
<body>

<div class="app" id="home">
  <header>
    <h1>IELTS 口說每日複習</h1>
    <div class="sub" id="dateLabel"></div>
    <div class="stats">
      <div class="stat"><div class="num" id="streakNum">0</div><div class="lbl">連續天數</div></div>
      <div class="stat"><div class="num" id="todayNum">0</div><div class="lbl">今日完成</div></div>
      <div class="stat"><div class="num" id="totalNum">0</div><div class="lbl">總題數</div></div>
    </div>
  </header>

  <div class="tab-bar">
    <button data-tab="today" class="active">今日複習</button>
    <button data-tab="p2">Part 2</button>
    <button data-tab="p3">Part 3</button>
  </div>

  <div id="cardList"></div>

  <button class="reset-btn" onclick="resetProgress()">清除學習進度</button>
</div>

<div class="overlay" id="overlay">
  <header>
    <button class="icon-btn" onclick="closeCard()">✕</button>
    <div class="overlay-title" id="ovTitle"></div>
    <button class="icon-btn" onclick="prevCard()">‹</button>
    <button class="icon-btn" onclick="nextCard()">›</button>
  </header>
  <div class="detail" id="detail"></div>
</div>

<div class="diff-bar" id="diffBar">
  <button class="diff-hard" onclick="rate('hard')">困難<br><small>明天再來</small></button>
  <button class="diff-mid" onclick="rate('mid')">普通<br><small>2 天後</small></button>
  <button class="diff-easy" onclick="rate('easy')">簡單<br><small>4 天後</small></button>
</div>

<script>
const DATA = [
  {
    id:"p2-city",
    type:"P2",
    topic:"去過且喜歡的城市",
    story:"jiufen",
    prompt:"Describe a city you enjoyed visiting. You should say: where it is, when you visited it, how long you stayed there, what you did there, and explain why you enjoyed visiting it.",
    en:"Well, I'd like to recommend Jiufen, which is a famous mountain town in the northern part of Taiwan, not far from Taipei. It used to be a mining village, but nowadays it has become one of the most popular tourist destinations in Taiwan. In Jiufen, visitors can walk along the old streets, which are lined with small shops selling traditional snacks like taro balls, fish balls, and peanut ice cream rolls. There are also many tea houses on the hillside, where people can sit down, enjoy some tea, and take in the stunning views of the mountains and the Pacific Ocean. One reason many travelers love this place is that it has a very nostalgic atmosphere. Some people even say it looks like scenes from the Japanese animation Spirited Away, so it's also a perfect place for taking photos. The main reason I would recommend it is that it perfectly combines Taiwanese culture, local food, and natural scenery. Whenever I go there, I feel like I can slow down, relax, and escape from the fast pace of city life. Another great thing is that it is very convenient to get there, since it only takes about an hour by bus from Taipei. So overall, I think Jiufen is absolutely worth visiting, especially for travelers who want to experience a more traditional and scenic side of Taiwan.",
    cn:"我想推薦九份，它是台灣北部一個很有名的山城，離台北不遠。它以前是一個採礦村，但現在已經變成台灣最受歡迎的旅遊景點之一。在九份，遊客可以沿著老街散步，街道兩旁有許多小店，賣著傳統小吃，像是芋圓、魚丸和花生冰淇淋捲。山坡上也有很多茶館，遊客可以坐下來喝茶，同時欣賞山景和太平洋的壯麗景色。很多旅客喜歡這個地方的一個原因是，它有一種非常懷舊的氛圍。有些人甚至說，它看起來很像日本動畫《神隱少女》的場景，所以也很適合拍照。我想推薦它最主要的原因是，它完美結合了台灣文化、在地美食和自然風景。每次我去那裡，我都覺得自己可以放慢腳步、放鬆心情，暫時逃離忙碌的都市生活。另外一個優點是交通非常方便，從台北搭公車大約一小時就能到。總的來說，我覺得九份真的非常值得一去，特別是對想體驗台灣更傳統、更有風景魅力一面的旅客。"
  },
  {
    id:"p2-nature",
    type:"P2",
    topic:"愛護自然之人",
    story:"grandfather",
    prompt:"Describe a person who loves to look after the natural world.",
    pairs:[
      ["One person I know who really loves to look after the natural world is my grandfather, who lives near a mountain in Yunlin.","我認識一個真的很熱愛照顧大自然的人，就是我的爺爺，他住在雲林靠近山的地方。"],
      ["I visit him almost every summer, and every time I go there, I can clearly see how much he enjoys taking care of the plants around his house.","我幾乎每年夏天都會去拜訪他，每次去都能清楚感受到他有多享受照顧屋子周圍植物這件事。"],
      ["He grows a wide variety of things — vegetables, herbs, and flowers.","他種了各式各樣的東西——蔬菜、香草和花卉。"],
      ["In his backyard, he has planted tomatoes, spring onions, and sweet potatoes, as well as different kinds of edible herbs.","在後院裡，他種了番茄、蔥和地瓜，還有各種可食用的香草植物。"],
      ["Because he used to be a science teacher before retiring, he has extensive knowledge about plants.","因為他退休前是自然科老師，所以他對植物有非常豐富的知識。"],
      ["Whenever we walk around his garden together, he proudly shows me how well his plants are doing, and sometimes he even teaches me how to recognise useful herbs and avoid poisonous ones.","每當我們一起在花園裡走動，他會驕傲地給我看他的植物長得多好，有時候還會教我辨認有用的香草，以及如何避開有毒的植物。"],
      ["He grows most of these plants right beside his house, where the environment is clean and filled with sunshine.","他把大部分植物種在房子旁邊，那裡環境乾淨、陽光充足。"],
      ["Since the area is close to the mountains, the air is fresh and the soil is particularly fertile, making it ideal for growing vegetables.","由於那一帶靠近山區，空氣清新，土壤特別肥沃，非常適合種蔬菜。"],
      ["He visits his garden every single day without fail, carefully tending to each plant with great patience.","他每天都一定會去花園，耐心地照料每一株植物。"],
      ["For him, growing plants is both meaningful and somewhat challenging.","對他來說，種植物既有意義，又有一定的挑戰性。"],
      ["He always says that gardening teaches people patience and encourages children to appreciate nature.","他常說園藝能教人學會耐心，也能培養孩子珍惜大自然的心。"],
      ["While many people nowadays set up home gardens on their balconies, and both traditional and modern agriculture focus heavily on efficiency, my grandfather believes that the most important thing is simply to enjoy the process of growing.","現代很多人在陽台設置家庭菜園，傳統農業和現代農業也都非常注重效率，但我爺爺認為最重要的事，是享受種植的過程本身。"],
      ["I feel truly inspired by him, because he does not just grow these plants for food — he genuinely loves every step of the journey.","我真的深受他啟發，因為他種植物不只是為了食物，他真心熱愛種植過程中的每一個環節。"],
      ["Because of his dedication and care, his garden is always full of life and incredibly productive.","因為他的用心與照料，他的花園總是充滿生機，也非常豐收。"],
      ["Spending time with him always makes me feel relaxed, and it reminds me to slow down, appreciate nature, and live a healthier life.","和他相處總讓我感到放鬆，也提醒我要放慢腳步、欣賞大自然、過更健康的生活。"]
    ]
  },
  {
    id:"p2-job",
    type:"P2",
    topic:"想從事的短期海外工作",
    story:"art-japan",
    prompt:"Describe a short-term job you want to have in a foreign country. You should say: where it is, how you know of it, what the job is, and explain why you want to do it.",
    en:"A short-term job I would really like to have in a foreign country is working as an art assistant or art teacher in a small studio, probably in Japan. I studied fine arts at university, and I've had some experience in art-related activities in Taiwan. Because of this background, I've always been interested in working in an art studio and sharing creative skills with others. In this job, I would mainly assist teachers in art classes, prepare materials like brushes and paper, and possibly help demonstrate some basic drawing techniques to students. I think I would mostly work with children, which would make the experience more fun and interactive. The main reason I want to do this job is that I really enjoy creative work, and I also like interacting with people. Teaching art allows me to express my ideas while also helping others improve their skills. Another reason is that working in a foreign country would give me a chance to experience a different culture and step out of my comfort zone. I believe it would be a meaningful short-term experience that combines both personal growth and enjoyment.",
    cn:"我想在國外做的一份短期工作，是在一間小型藝術工作室當助教或老師，地點可能是在日本。我在大學主修美術，並且在台灣有一些與藝術相關的經驗。因為這樣的背景，我一直對在藝術工作室工作，以及把創作技能分享給他人很有興趣。在這份工作中，我主要會協助老師上課、準備像畫筆和紙張這樣的材料，也可能會示範一些基本的繪畫技巧。我想我應該會主要和小朋友互動，這會讓整個經驗更有趣、更有互動性。我想做這份工作的主要原因是，我很喜歡創作，同時也喜歡和人互動。教藝術可以讓我表達自己的想法，也能幫助他人提升能力。另外一個原因是，在國外工作可以讓我體驗不同文化，並且走出自己的舒適圈。我相信這會是一個結合個人成長與樂趣的有意義短期經驗。"
  },
  {
    id:"p2-advice",
    type:"P2",
    topic:"給別人建議",
    story:"ai-comp",
    prompt:"Describe a time when you gave advice to others. You should say: when it was, to whom you gave the advice, what the advice was, and explain why you gave the advice.",
    en:"One time I gave advice to others was during an AI competition last year. I was working as a product manager, and my team and I were developing an AI generation tool. I gave advice to my teammates after our first internal demo. At that time, some parts of our product were a bit complicated, especially the user interface, which made it difficult for new users to understand. My advice was to simplify the interface and make the workflow more intuitive. For example, I suggested reducing unnecessary steps and adding clearer instructions so users could understand how the system worked more easily. The reason I gave this advice was that I wanted to improve the user experience and make the product more accessible, especially for people who were not familiar with AI. After we applied these changes, the product became much easier to use, and we received more positive feedback from both users and judges. In the end, we even won an award in the competition. Overall, it was a meaningful experience because it showed me how important it is to give constructive advice and work as a team to improve a product.",
    cn:"我曾經給別人建議的一次，是在去年參加 AI 比賽的時候。我當時是產品經理，和團隊一起開發一個 AI 生成工具。在第一次內部 demo 之後，我給團隊一些建議。當時產品有些地方太複雜，特別是介面，讓新使用者不容易理解。我的建議是簡化介面，讓操作流程更直覺。例如減少不必要的步驟，並加入更清楚的說明。我給這些建議的原因，是希望改善使用者體驗，讓不熟 AI 的人也能使用。後來我們採用了這些建議，產品變得更容易使用，也得到評審和使用者更多正面回饋，最後還得獎。這是一個很有意義的經驗，讓我學到給建議和團隊合作的重要性。"
  },
  {
    id:"p2-helpful",
    type:"P2",
    topic:"樂於助人的人",
    story:"brother-art",
    prompt:"Describe a person who often helps others. You should say: who this person is, how often he/she helps others.",
    en:"A person I know who often helps others is my brother. He works in our family art studio, where my mom teaches painting and drawing to children. He helps others almost every day, especially when he is assisting in art classes. For example, he helps students prepare materials, teaches them basic drawing techniques, and gives them advice on how to improve their work. What I admire most is that he is very patient and supportive. Even when students make mistakes, he encourages them and helps them build confidence. Thanks to his help, some of the students have even won prizes in drawing competitions, which shows how much of a positive impact he has. I think he often helps others because he truly enjoys sharing his knowledge and seeing others grow. That's why I really admire him.",
    cn:"我認識一個很常幫助別人的人是我的哥哥。他在我們家的藝術工作室工作，我媽媽在那裡教小朋友畫畫。他幾乎每天都在幫助別人，特別是在上課的時候。例如，他會幫學生準備材料、教基本的畫畫技巧，還會給他們建議幫助進步。我最欣賞的是，他非常有耐心又願意支持學生。即使學生犯錯，他也會鼓勵他們、幫助他們建立信心。在他的幫助下，有些學生甚至在比賽中得獎，這也顯示他對別人的正面影響。我覺得他會這麼常幫助別人，是因為他真的很享受分享知識、看到別人成長。"
  },

  {
    id:"p3-job-1",type:"P3",topic:"想從事的短期海外工作",
    prompt:"What short-term job do young people do in other countries?",
    keywords:"cafés, restaurants",
    en:"I think many young people in other countries take short-term jobs in places like cafés or restaurants. These jobs are quite popular because they are relatively easy to find and don't require a lot of experience. For example, they might work as baristas, waiters, or cashiers, where they serve customers, take orders, and prepare drinks. These kinds of jobs are usually flexible, so students can balance their work and studies. Another reason is that working in a café helps them improve their communication skills and become more independent. So overall, I think café jobs are a very common and practical choice for young people.",
    cn:"我覺得很多國外年輕人會做像咖啡店或餐廳這樣的短期工作。這類工作很受歡迎，因為比較容易找到，而且不需要太多經驗。例如，他們可能會當咖啡師、服務生或收銀員，負責服務客人、點餐和準備飲料。這類工作通常時間彈性，所以學生可以兼顧工作和學業。另外，在咖啡店工作也可以幫助他們提升溝通能力，並變得更獨立。所以整體來說，我覺得咖啡店工作是年輕人很常見且實用的選擇。"
  },
  {
    id:"p3-job-2",type:"P3",topic:"想從事的短期海外工作",
    prompt:"What challenges do young people face when working abroad?",
    keywords:"language barriers, feel lonely and isolated",
    en:"I think young people may face several challenges when working abroad. One of the biggest difficulties is language barriers, especially if they are not fluent in the local language. This can make it hard for them to communicate with colleagues or customers. Another common challenge is that they may feel lonely or isolated, because they are far away from their family and friends. It can take time to build new relationships in a different country. In addition, they might also need to adapt to a new culture and working environment, which can be stressful at the beginning. So overall, working abroad can be challenging, but it is also a valuable learning experience.",
    cn:"我覺得年輕人在國外工作可能會面臨幾個挑戰。最大的一個問題是語言障礙，特別是當他們不熟悉當地語言時，會很難和同事或客人溝通。另一個常見的挑戰是，他們可能會感到孤單或有孤立感，因為離家人和朋友很遠。在新的國家建立人際關係需要時間。此外，他們也需要適應新的文化和工作環境，這在一開始可能會讓人感到壓力。所以整體來說，在國外工作雖然有挑戰，但同時也是一個很有價值的學習經驗。"
  },
  {
    id:"p3-job-3",type:"P3",topic:"想從事的短期海外工作",
    prompt:"What are the benefits of working for an international company?",
    keywords:"different cultures, improve language skills",
    en:"I think there are several benefits of working for an international company. One major advantage is that people can experience different cultures and working environments, which helps them become more open-minded and adaptable. Another benefit is that it can help improve their language skills, especially English, because they often need to communicate with colleagues or clients from different countries. In addition, working in an international company can provide more career opportunities, since employees may have the chance to work on global projects or even relocate to other countries. So overall, I think it is a great way to develop both professional skills and personal growth.",

    en:"A person I know who makes plans a lot is my brother. He works in our family art studio, where my mom teaches painting and drawing to children. Because the studio is busy almost every day, he is in charge of organizing the schedule, preparing materials, and planning each class in detail. He always writes everything down in his notebook—what to teach, which students need extra help, and even what to buy from the art supply shop. What surprises me most is that he plans not only for work but also for his personal life. For example, he plans his weekly workout, his weekend trips, and even small things like what to cook for dinner. At first, I thought he was a little too organized, but later I realized that his careful planning is exactly why everything in the studio runs so smoothly. Thanks to his planning, the children always have a well-prepared environment, and my mom can focus on teaching. I really admire him because he is responsible, patient, and never leaves things to chance.",
    cn:"我認識一個很常做計劃的人，就是我的哥哥。他在我們家的藝術工作室工作，我媽媽在那裡教小朋友畫畫和繪畫。因為工作室幾乎每天都很忙，他負責排課表、準備材料、仔細規劃每一堂課。他總是把所有事情都寫在筆記本裡——要教什麼、哪些學生需要額外幫助、甚至要去美術社買什麼東西。最讓我驚訝的是，他不只在工作上做計劃，連個人生活也是。例如，他會規劃每週的運動、週末出遊，連晚餐要煮什麼這種小事都會計劃。一開始我覺得他有點太有條理了，但後來才發現工作室能順利運作，正是因為他細心的規劃。多虧了他的計劃，小朋友總能在準備充足的環境中上課，我媽也能專心教學。我真的很欣賞他，因為他負責、有耐心，而且從不會把事情交給運氣。"

    en:"One time I was not allowed to use a mobile phone was during a sudden power outage at home in Taipei last summer. It happened in the evening, around seven or eight, and the whole neighborhood went dark all at once. Although technically nobody told me I couldn't use my phone, my battery was almost empty, and I had no way to charge it. So I decided to save the battery in case of emergency. Without my phone, I felt strange at first because I usually check it every few minutes. I couldn't scroll social media, reply to messages, or watch videos. The room was hot because the air conditioner stopped working, so I opened the windows to get some fresh air. I sat in the living room with my family, and since none of us could use any electronics, we just talked and spent time together. It actually felt peaceful because the whole place became quiet. I felt that even though it was inconvenient, this short break from the phone was a nice reminder that we depend on technology more than we realize.",

  {
    id:"p2-family",type:"P2",topic:"家族長期保留的物品",story:"grandfather",
    prompt:"Describe something important that has been kept in your family for a long time. You should say: what it is, when family had it, how they got it, and explain why it is important to your family.",
    en:"Something important that has been kept in my family for a long time is my grandfather's plant journal. It is a thick handwritten notebook where he recorded his observations of plants, herbs, and small animals over the years. He started writing it when he was a young science teacher, more than fifty years ago, and he continued adding to it after he retired. The notebook itself is quite old now—the cover is faded and some pages are yellowed—but every page is full of his neat handwriting, with little drawings of leaves and flowers next to the notes. I think it is important because it represents not only his knowledge but also his love for nature. Every time I visit him in Yunlin, he likes to open the notebook and tell me stories about how he discovered each plant or how farmers in the past used herbs as medicine. He has told me that one day this notebook will be passed on to me. I feel really honored, because it's much more than a notebook—it's a record of my grandfather's life and a precious connection between our generations.",
    cn:"我們家族長期保存的一件重要物品，是爺爺的植物筆記本。那是一本很厚的手寫筆記，記錄了他多年來對植物、香草和小動物的觀察。他從年輕時當自然老師就開始寫，距今已超過五十年，退休後也持續補充。筆記本本身已經有點舊了——封面褪色，有些頁面變黃——但每一頁都滿滿是他工整的字跡，旁邊還畫著葉子和花的小圖。我覺得它很重要，因為它代表的不只是他的知識，還有他對大自然的熱愛。每次我去雲林看他，他都喜歡翻開筆記本，告訴我他怎麼發現每一種植物，或是農夫以前怎麼用香草當藥材的故事。他告訴我有一天這本筆記會傳給我。我覺得很榮幸，因為它不只是一本筆記，更是爺爺一生的紀錄，也是世代之間珍貴的連結。"
  },

    id:"p2-story",type:"P2",topic:"最近讀的故事",story:"little-prince",
    prompt:"Describe a story (e.g. a fairy tale) you have read recently. You should say: what it's about, when you read it, whether you liked it, and what you learned from it.",
    en:"A story I read recently is The Little Prince by Antoine de Saint-Exupéry. It's a classic French novella, and although I first read it as a child, I picked it up again last month when I found my old copy on the bookshelf. The story is about a young prince who travels from his small planet to different worlds, meeting strange characters along the way—like a king with no subjects, a businessman who counts stars, and a fox who teaches him the meaning of love. Eventually, he lands on Earth and becomes friends with a pilot who has crashed in the desert. What I love about this story is that even though it looks simple and is written for children, it has very deep meanings about friendship, responsibility, and what truly matters in life. One of my favorite lines is, 'What is essential is invisible to the eye.' Reading it again as an adult, I felt like I understood the story in a totally new way. It reminded me to slow down, appreciate small moments, and value the people around me. That's why this short book has become one of my all-time favorites.",
    cn:"我最近讀的一個故事是法國作家聖修伯里寫的《小王子》。這是一本經典的法文短篇小說，雖然我小時候就讀過，但上個月在書架上發現舊版本，又重新拿起來讀。故事講的是一位小王子從他的小星球出發，去拜訪不同的世界，途中遇到很多奇特的角色——比如一個沒有臣民的國王、一個只會數星星的商人，還有一隻狐狸，是這隻狐狸教他什麼是愛。最後他降落在地球上，跟一位墜機的飛行員成為朋友。我喜歡這個故事的原因是，雖然看起來簡單、是寫給小孩的，但其實有很深的含義，講的是友誼、責任、和人生中真正重要的事情。我最喜歡的一句話是「真正重要的東西，眼睛是看不見的。」長大後重讀，感覺像是用全新的角度理解這個故事。它提醒我要放慢腳步，珍惜小小的時刻，重視身邊的人。所以這本短短的書，成為我最喜歡的書之一。"
  },
  {

    cn:"兩者都有價值。父母自己講的故事比較親切溫暖，因為父母可以用不同聲音、表情、加入自己的點子。但書通常有漂亮插圖和完整劇情。我覺得最好的方式是父母念出書本，結合兩者的優點。"

  {
    id:"p2-animal",type:"P2",topic:"想了解的野生動物",story:"instagram-quokka",

// ============= State =============
const STORAGE_KEY = "ielts_daily_v1";
const today = () => new Date().toISOString().slice(0,10);
const dayDiff = (a,b) => Math.round((new Date(a)-new Date(b))/86400000);

let state = loadState();
let currentTab = "today";
let currentDeck = [];
let currentIdx = 0;
let displayMode = "both"; // en | cn | both
let showAnswer = false;

function loadState(){
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    return {
      cards: s.cards || {},
      streak: s.streak || 0,
      lastDate: s.lastDate || null,
      todayCount: s.todayDate === today() ? (s.todayCount||0) : 0,
      todayDate: today()
    };
  } catch { return {cards:{},streak:0,lastDate:null,todayCount:0,todayDate:today()}; }
}
function saveState(){
  state.todayDate = today();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function getCardState(id){
  return state.cards[id] || {nextDue: today(), reviewed: 0, lastDiff: null};
}

// ============= Deck =============
function getTodayDeck(){
  const t = today();
  return DATA.filter(c => {
    const cs = getCardState(c.id);
    return cs.nextDue <= t;
  }).sort((a,b) => {
    const dueA = getCardState(a.id).nextDue;
    const dueB = getCardState(b.id).nextDue;
    return dueA.localeCompare(dueB);
  });
}

function rate(level){
  const card = currentDeck[currentIdx];
  const cs = getCardState(card.id);
  const days = level === "easy" ? 4 : level === "mid" ? 2 : 1;
  const next = new Date();
  next.setDate(next.getDate() + days);
  state.cards[card.id] = {
    nextDue: next.toISOString().slice(0,10),
    reviewed: cs.reviewed + 1,
    lastDiff: level
  };
  // update streak/today count
  if (state.lastDate !== today()){
    if (state.lastDate && dayDiff(today(), state.lastDate) === 1) state.streak += 1;
    else state.streak = 1;
    state.lastDate = today();
  }
  state.todayCount = (state.todayDate === today() ? state.todayCount : 0) + 1;
  state.todayDate = today();
  saveState();
  nextCard();
  renderHome();
}

// ============= Render =============
function renderHome(){
  document.getElementById('dateLabel').textContent = today() + " · 加油 💪";
  document.getElementById('streakNum').textContent = state.streak;
  document.getElementById('todayNum').textContent = state.todayCount;
  document.getElementById('totalNum').textContent = DATA.length;

  const list = document.getElementById('cardList');
  list.innerHTML = '';

  let cards;
  if (currentTab === "today") cards = getTodayDeck();
  else if (currentTab === "p2") cards = DATA.filter(c => c.type === "P2");
  else if (currentTab === "p3") cards = DATA.filter(c => c.type === "P3");
  else cards = DATA;

  if (cards.length === 0 && currentTab === "today"){
    list.innerHTML = '<div class="empty">🎉 今天的題目都複習完了！<br>明天再來吧～</div>';
    return;
  }

  cards.forEach((c,i) => {
    const cs = getCardState(c.id);
    const isDue = cs.nextDue <= today();
    const reviewed = cs.reviewed > 0 ? `已練 ${cs.reviewed} 次` : '尚未練習';
    const isBrowse = currentTab !== "today";
    const dueText = isBrowse ? (isDue ? '今日待複習' : `${cs.nextDue} 複習`) : '';
    const el = document.createElement('div');
    el.className = 'card' + (isDue && isBrowse ? ' due' : '');
    const storyBadge = c.story ? `<span class="story-tag">${STORY_LABELS[c.story]?.split(/[（(]/)[0].trim() || c.story}</span>` : '';
    el.innerHTML = `
      <span class="tag ${c.type.toLowerCase()}">${c.type}</span>
      <span style="font-size:12px;color:#86868b">${c.topic}</span>
      ${storyBadge}
      <div class="topic">${c.type === 'P3' ? c.prompt : c.topic}</div>
      ${c.type === 'P2' ? `<div class="prompt">${c.prompt}</div>` : ''}
      <div class="meta"><span>${reviewed}</span>${dueText ? `<span>${dueText}</span>` : ''}</div>
    `;
    el.onclick = () => openCard(cards, i);
    list.appendChild(el);
  });
}

// ============= Card detail =============
function openCard(deck, idx){
  currentDeck = deck;
  currentIdx = idx;
  showAnswer = false;
  displayMode = "both";
  renderCard();
  document.getElementById('overlay').classList.add('show');
}
function closeCard(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('diffBar').classList.remove('show');
  speechSynthesis.cancel();
}
function nextCard(){
  speechSynthesis.cancel();
  if (currentIdx < currentDeck.length - 1){
    currentIdx += 1;
    showAnswer = false;
    displayMode = "both";
    renderCard();
  } else {
    closeCard();
  }
}
function prevCard(){
  speechSynthesis.cancel();
  if (currentIdx > 0){
    currentIdx -= 1;
    showAnswer = false;
    displayMode = "both";
    renderCard();
  }
}

function renderCard(){
  const c = currentDeck[currentIdx];
  document.getElementById('ovTitle').textContent = `${currentIdx + 1} / ${currentDeck.length} · ${c.topic}`;
  const detail = document.getElementById('detail');
  const diffBar = document.getElementById('diffBar');

  let promptHtml = `
    <div class="prompt-box">
      <span class="tag">${c.type} · ${c.topic}</span>
      ${c.type === 'P2' ? `<div class="topic">${c.topic}</div>` : ''}
      <div class="q">${c.prompt}</div>
      ${c.keywords ? `<div class="kw">💡 關鍵字: ${c.keywords}</div>` : ''}
    </div>
  `;

  if (!showAnswer){
    detail.innerHTML = promptHtml + `
      <button class="reveal-btn" onclick="reveal()">顯示答案</button>
      <p style="text-align:center;color:#86868b;font-size:13px;padding:20px">先試著開口講一次再看答案 🎤</p>
    `;
    diffBar.classList.remove('show');
    return;
  }

  // answer rendering
  let answerHtml = '';
  if (c.pairs){
    // sentence-by-sentence
    answerHtml = '<div class="answer">';
    c.pairs.forEach(([en,cn]) => {
      answerHtml += `<div class="row">`;
      if (displayMode !== "cn") answerHtml += `<p class="en">${en}</p>`;
      if (displayMode !== "en") answerHtml += `<p class="cn">${cn}</p>`;
      answerHtml += `</div>`;
    });
    answerHtml += '</div>';
  } else {
    answerHtml = '<div class="answer">';
    if (displayMode !== "cn") answerHtml += `<p class="en">${c.en}</p>`;
    if (displayMode !== "en" && c.cn) answerHtml += `<p class="cn">${c.cn}</p>`;
    answerHtml += '</div>';
  }

  // story reuse links
  let storyHtml = '';
  if (c.story && STORY_LABELS[c.story]){
    const sameStory = DATA.filter(x => x.story === c.story && x.id !== c.id);
    if (sameStory.length > 0){
      const links = sameStory.map(x => `<a href="javascript:void(0)" onclick="jumpToCard('${x.id}')">${x.topic}</a>`).join('');
      storyHtml = `<div class="story-box">
        <span class="label">💡 同一個故事可以套用於：</span>
        <div style="margin-bottom:8px;font-size:12px;color:#92400e">${STORY_LABELS[c.story]}</div>
        <div class="links">${links}</div>
      </div>`;
    } else {
      storyHtml = `<div class="story-box">
        <span class="label">💡 故事核心</span>
        <div style="font-size:12px;color:#92400e">${STORY_LABELS[c.story]}</div>
      </div>`;
    }
  }

  detail.innerHTML = promptHtml + `
    <button class="tts-btn" onclick="speak()">🔊 朗讀英文</button>
    <div class="toolbar">
      <button class="${displayMode === 'both' ? 'active' : ''}" onclick="setMode('both')">雙語</button>
      <button class="${displayMode === 'en' ? 'active' : ''}" onclick="setMode('en')">英文</button>
      <button class="${displayMode === 'cn' ? 'active' : ''}" onclick="setMode('cn')">中文</button>
    </div>
    ${answerHtml}
    ${storyHtml}
  `;
  diffBar.classList.add('show');
}

function jumpToCard(id){
  const idx = DATA.findIndex(c => c.id === id);
  if (idx >= 0){
    currentDeck = DATA;
    currentIdx = idx;
    showAnswer = false;
    displayMode = "both";
    speechSynthesis.cancel();
    renderCard();
  }
}

function reveal(){ showAnswer = true; renderCard(); }
function setMode(m){ displayMode = m; renderCard(); }

function speak(){
  speechSynthesis.cancel();
  const c = currentDeck[currentIdx];
  let text = c.pairs ? c.pairs.map(p => p[0]).join(' ') : c.en;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function resetProgress(){
  if (!confirm('確定要清除所有學習進度嗎？')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  renderHome();
}

// tab switching
document.querySelectorAll('.tab-bar button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    renderHome();
  };
});

// keyboard navigation in overlay
document.addEventListener('keydown', e => {
  if (!document.getElementById('overlay').classList.contains('show')) return;
  if (e.key === 'Escape') closeCard();
  else if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ' && !showAnswer){ e.preventDefault(); reveal(); }
});

renderHome();
</script>
</body>
</html>
