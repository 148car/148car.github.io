<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美美子 w. 媽 TOKYO TRIP ⚾ 🇹🇼 🔥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FDFBFA; 
            --soft-gray: #F8F8F8;
            --earth-brown: #8E8282;
            --text-dark: #444444;
            --border-light: #F0F0F0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            padding-bottom: 120px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .rounded-card { border-radius: 20px; overflow: hidden; }
        .shadow-card { box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .day-tab.active {
            background-color: var(--earth-brown);
            color: white;
        }

        .timeline-line {
            position: absolute;
            left: 20px;
            top: 40px;
            bottom: 20px;
            width: 2px;
            background: #E5E7EB;
            z-index: 0;
        }

        .timeline-dot {
            width: 12px;
            height: 12px;
            background: var(--earth-brown);
            border-radius: 50%;
            position: absolute;
            left: 15px;
            top: 40px;
            z-index: 10;
            border: 3px solid white;
        }

        .btn-toggle-tips {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            background-color: var(--soft-gray);
            border-radius: 12px;
            font-size: 12px;
            color: #777;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 500;
        }

        .tips-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #FFF;
        }

        .tips-container.open {
            max-height: 2000px;
            padding: 15px 0 5px 0;
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        @media (min-width: 768px) {
            .card-img { height: 240px; }
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-btn.active { color: var(--earth-brown); font-weight: 700; }
        
        .spot-badge {
            background: #F3F4F6;
            color: #6B7280;
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .important-badge {
            background: #FEF2F2;
            color: #EF4444;
        }
    </style>
</head>
<body>

    <header class="bg-white/70 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-2xl mx-auto pt-8 px-6 pb-4 text-center">
            <h1 class="text-base font-bold mb-5 text-gray-700">美美子 w. 媽 TOKYO TRIP ⚾ 🇹🇼 🔥</h1>
            <div class="flex overflow-x-auto no-scrollbar space-x-3 pb-2" id="day-selector">
                <div onclick="switchDay(1)" id="tab-1" class="day-tab flex-shrink-0 px-5 py-3 rounded-2xl bg-white shadow-sm text-center min-w-[85px] cursor-pointer transition-all">
                    <div class="text-[10px] opacity-50 uppercase tracking-tighter">Day 1</div>
                    <div class="font-bold text-base">3/4</div>
                </div>
                <div onclick="switchDay(2)" id="tab-2" class="day-tab flex-shrink-0 px-5 py-3 rounded-2xl bg-white shadow-sm text-center min-w-[85px] cursor-pointer transition-all">
                    <div class="text-[10px] opacity-50 uppercase tracking-tighter">Day 2</div>
                    <div class="font-bold text-base">3/5</div>
                </div>
                <div onclick="switchDay(3)" id="tab-3" class="day-tab flex-shrink-0 px-5 py-3 rounded-2xl bg-white shadow-sm text-center min-w-[85px] cursor-pointer transition-all">
                    <div class="text-[10px] opacity-50 uppercase tracking-tighter">Day 3</div>
                    <div class="font-bold text-base">3/6</div>
                </div>
                <div onclick="switchDay(4)" id="tab-4" class="day-tab flex-shrink-0 px-5 py-3 rounded-2xl bg-white shadow-sm text-center min-w-[85px] cursor-pointer transition-all">
                    <div class="text-[10px] opacity-50 uppercase tracking-tighter">Day 4</div>
                    <div class="font-bold text-base">3/7</div>
                </div>
                <div onclick="switchDay(5)" id="tab-5" class="day-tab flex-shrink-0 px-5 py-3 rounded-2xl bg-white shadow-sm text-center min-w-[85px] cursor-pointer transition-all">
                    <div class="text-[10px] opacity-50 uppercase tracking-tighter">Day 5</div>
                    <div class="font-bold text-base">3/8</div>
                </div>
                <div onclick="switchDay(6)" id="tab-6" class="day-tab flex-shrink-0 px-5 py-3 rounded-2xl bg-white shadow-sm text-center min-w-[85px] cursor-pointer transition-all">
                    <div class="text-[10px] opacity-50 uppercase tracking-tighter">Day 6</div>
                    <div class="font-bold text-base">3/9</div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 mt-6 pb-10" id="content-area"></main>

    <nav class="fixed bottom-0 left-0 right-0 bottom-nav z-50">
        <div class="max-w-2xl mx-auto h-24 flex items-center justify-around px-10 pb-4">
            <button onclick="showSection('itinerary')" id="nav-itinerary" class="nav-btn flex flex-col items-center text-gray-400">
                <span class="text-2xl">📅</span>
                <span class="text-[11px] mt-1">行程</span>
            </button>
            <button onclick="showSection('tickets')" id="nav-tickets" class="nav-btn flex flex-col items-center text-gray-400">
                <span class="text-2xl">🎫</span>
                <span class="text-[11px] mt-1">票券</span>
            </button>
            <button onclick="showSection('shopping')" id="nav-shopping" class="nav-btn flex flex-col items-center text-gray-400">
                <span class="text-2xl">🛍️</span>
                <span class="text-[11px] mt-1">購物</span>
            </button>
        </div>
    </nav>

    <!-- 願望清單 Modal -->
    <div id="wishlist-modal" class="hidden fixed inset-0 z-[200] flex items-end justify-center" onclick="closeWishlistModal()">
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="relative bg-white rounded-t-3xl w-full max-w-2xl px-6 pt-5 pb-10 shadow-2xl" onclick="event.stopPropagation()">
            <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-5"></div>
            <h3 id="wishlist-modal-title" class="font-bold text-lg text-gray-800 mb-5">新增願望清單</h3>

            <!-- 圖片上傳 -->
            <div class="mb-4">
                <label class="block text-xs text-gray-400 mb-2 font-medium uppercase tracking-wide">商品圖片</label>
                <div class="border-2 border-dashed border-gray-200 rounded-2xl overflow-hidden cursor-pointer" onclick="document.getElementById('img-input').click()">
                    <img id="wishlist-preview" class="hidden w-full h-40 object-cover" alt="預覽">
                    <div id="upload-placeholder" class="flex flex-col items-center justify-center h-28 text-gray-300">
                        <span class="text-3xl mb-1">📷</span>
                        <span class="text-xs">點擊上傳圖片</span>
                    </div>
                </div>
                <input type="file" id="img-input" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            </div>

            <!-- 商品名稱 -->
            <div class="mb-4">
                <label class="block text-xs text-gray-400 mb-2 font-medium uppercase tracking-wide">商品名稱 <span class="text-red-400">*</span></label>
                <input type="text" id="wishlist-name" placeholder="例：龍角散潤喉糖"
                    class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm bg-gray-50 focus:outline-none focus:border-[#8E8282]">
                <p id="wishlist-name-error" class="hidden text-red-400 text-xs mt-1 pl-1">⚠️ 請填寫商品名稱再儲存</p>
            </div>

            <!-- 購買地點 -->
            <div class="mb-7">
                <label class="block text-xs text-gray-400 mb-2 font-medium uppercase tracking-wide">購買地點</label>
                <input type="text" id="wishlist-location" placeholder="例：松本清、OS Drug"
                    class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm bg-gray-50 focus:outline-none focus:border-[#8E8282]">
            </div>

            <!-- 按鈕 -->
            <div class="flex gap-3">
                <button onclick="closeWishlistModal()" class="flex-1 py-3 rounded-2xl bg-gray-100 text-gray-500 text-sm font-medium">取消</button>
                <button onclick="saveWishlistItem()" class="flex-1 py-3 rounded-2xl text-white text-sm font-bold" style="background-color: var(--earth-brown)">儲存</button>
            </div>
        </div>
    </div>

    <script>
        let currentDay = 1;
        let currentSection = 'itinerary';
        let editingWishlistIndex = -1;

        window.onload = () => {
            switchDay(1);
        };

        function toggleTips(id) {
            const container = document.getElementById(id);
            if(!container) return;
            container.classList.toggle('open');
            const btn = container.previousElementSibling;
            btn.innerHTML = container.classList.contains('open') ? '▲ 收起貼心提醒' : '▼ 展開貼心提醒';
        }

        function switchDay(day) {
            currentDay = day;
            currentSection = 'itinerary';
            updateNavUI();
            
            document.querySelectorAll('.day-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + day).classList.add('active');
            
            const content = document.getElementById('content-area');
            content.innerHTML = '';
            
            if (day === 1) renderDay1(content);
            else if (day === 2) renderDay2(content);
            else if (day === 3) renderDay3(content);
            else if (day === 4) renderDay4(content);
            else if (day === 5) renderDay5(content);
            else if (day === 6) renderDay6(content);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showSection(section) {
            currentSection = section;
            updateNavUI();
            const content = document.getElementById('content-area');
            content.innerHTML = '';
            if (section === 'itinerary') switchDay(currentDay);
            else if (section === 'shopping') renderShopping(content);
            else if (section === 'tickets') renderTickets(content);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateNavUI() {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav-' + currentSection).classList.add('active');
        }

        function createWeatherBanner(location, icon, condition, high, low, rain, tip, fujiData = null) {
            let fujiRow = '';
            if (fujiData) {
                const { percent, label, note } = fujiData;
                const r = 24;
                const circ = +(2 * Math.PI * r).toFixed(2);
                const dash = +((percent / 100) * circ).toFixed(2);
                const gap = +(circ - dash).toFixed(2);
                const color = percent >= 70 ? '#22c55e' : percent >= 40 ? '#f59e0b' : '#ef4444';
                const trackColor = percent >= 70 ? '#dcfce7' : percent >= 40 ? '#fef3c7' : '#fee2e2';
                fujiRow = `
                        <div class="mt-2 pt-2 border-t border-gray-100 flex items-center gap-3">
                            <svg width="68" height="68" viewBox="0 0 60 60" style="flex-shrink:0">
                                <circle cx="30" cy="30" r="${r}" fill="none" stroke="${trackColor}" stroke-width="7"/>
                                <circle cx="30" cy="30" r="${r}" fill="none" stroke="${color}" stroke-width="7"
                                    stroke-dasharray="${dash} ${gap}"
                                    stroke-linecap="round"
                                    transform="rotate(-90, 30, 30)"/>
                                <text x="30" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="${color}" font-family="sans-serif">${percent}%</text>
                                <text x="30" y="38" text-anchor="middle" font-size="8" fill="#9ca3af" font-family="sans-serif">能見</text>
                            </svg>
                            <div class="min-w-0">
                                <div class="text-[10px] text-gray-400 font-medium mb-0.5">🗻 富士山能見機率（歷史均值）</div>
                                <div class="text-[12px] font-bold" style="color:${color}">${label}</div>
                                ${note ? `<div class="text-[10px] text-gray-400 mt-0.5">${note}</div>` : ''}
                            </div>
                        </div>`;
            }
            return `
                <div class="pl-10 mb-6 fade-in">
                <div class="flex items-center gap-4 bg-white rounded-2xl shadow-card border border-gray-100 px-5 py-4">
                    <div class="text-4xl leading-none">${icon}</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] text-gray-400 font-medium uppercase tracking-widest mb-0.5">${location} · 歷史均值參考</div>
                        <div class="flex items-baseline gap-2">
                            <span class="text-xl font-bold text-gray-800">${high}°C</span>
                            <span class="text-sm text-gray-400">/ ${low}°C · ${condition}</span>
                        </div>
                        <div class="flex flex-wrap gap-x-3 mt-1 text-[11px] text-gray-400">
                            <span>💧 降雨 ${rain}%</span>
                            <span>👗 ${tip}</span>
                        </div>
                        ${fujiRow}
                    </div>
                </div>
                </div>`;
        }

        function createCard(badge, title, subtitle, imgUrl, tipsHtml, isImportant = false, mapUrl = '') {
            const id = 'tips-' + Math.random().toString(36).substr(2, 9);
            return `
                <div class="relative pl-10 mb-8 fade-in">
                    <div class="timeline-dot"></div>
                    <div class="bg-white rounded-card shadow-card overflow-hidden border border-gray-100 relative">
                        ${mapUrl ? `<a href="${mapUrl}" target="_blank" rel="noopener" style="position:absolute;top:10px;right:10px;z-index:10;display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;color:#444;background:rgba(255,255,255,0.88);border:1px solid rgba(0,0,0,0.08);border-radius:8px;padding:4px 9px;text-decoration:none;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);">📍 地圖</a>` : ''}
                        <img src="${imgUrl}" class="card-img" alt="${title}" onerror="this.src='https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=800&auto=format&fit=crop'">
                        <div class="p-6">
                            <span class="spot-badge ${isImportant ? 'important-badge' : ''}">${badge}</span>
                            <h3 class="font-bold text-xl text-gray-800 tracking-tight">${title}</h3>
                            <p class="text-gray-500 text-sm mt-2 leading-relaxed">${subtitle}</p>
                            <button onclick="toggleTips('${id}')" class="btn-toggle-tips">
                                ▼ 展開貼心提醒
                            </button>
                            <div id="${id}" class="tips-container">
                                <div class="text-xs text-gray-600 leading-loose border-t pt-4">
                                    ${tipsHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDay1(container) {
            container.innerHTML = `
                <div class="relative">
                    <div class="timeline-line"></div>
                    <div class="mb-8 pl-10"><h2 class="text-2xl font-bold text-gray-800">Day 1 抵達東京</h2></div>
                    ${createWeatherBanner('東京', '🌤️', '晴時多雲', 12, 6, 15, '厚外套＋薄圍巾')}
                    ${createCard('16:25 出發', '✈️ 中華航空 CI104', '桃園機場 T2 ➔ 成田機場 T2', 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=800&auto=format&fit=crop', '• 20:25 準時降落成田機場。<br>• 記得在機上先填好 VJW 或準備好紙本入境卡。<br>• 領取行李預計花費 1 小時。<br><br><b>🎫 電子機票</b><br><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;"><a href="https://drive.google.com/file/d/1m9NmXqjG0ZKFG5Z85gBe584DYmsSiH5U/view?usp=sharing" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#F0F4FF;border-radius:10px;padding:9px 14px;font-size:12px;color:#4A6CF7;text-decoration:none;font-weight:600;">📄 媽媽的機票</a><a href="https://drive.google.com/file/d/1FE3AaxojWRF6dvLU0Ka3IdDgQXKSr21_/view?usp=sharing" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#F0F4FF;border-radius:10px;padding:9px 14px;font-size:12px;color:#4A6CF7;text-decoration:none;font-weight:600;">📄 美美子的機票</a></div><br><b style="font-size:11px;color:#9ca3af;">媽媽</b><iframe src="https://drive.google.com/file/d/1m9NmXqjG0ZKFG5Z85gBe584DYmsSiH5U/preview" width="100%" height="400" style="border-radius:12px;border:1px solid #e5e7eb;margin-top:4px;display:block;" allow="autoplay"></iframe><br><b style="font-size:11px;color:#9ca3af;">美美子</b><iframe src="https://drive.google.com/file/d/1FE3AaxojWRF6dvLU0Ka3IdDgQXKSr21_/preview" width="100%" height="400" style="border-radius:12px;border:1px solid #e5e7eb;margin-top:4px;display:block;" allow="autoplay"></iframe>', false, 'https://maps.google.com/?q=成田国際空港+第2ターミナル')}
                    ${createCard('交通方式', '🚆 京成電鐵 Access 特快', '成田機場 ➔ 淺草站', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjW27BOyGqMQlt3zZ_x0Jes5uU7L-Ve0lAzg&s', '• 淺草站下車後，請尋找 <b>A2b 出口</b>。<br>• A2b 有直達地面的大電梯，這對推大行李的人非常重要。<br>• 如果不會走，可以參考這個網址：<a href="https://wind.suzukihiro.tw/access-express2025/" target="_blank" style="color:#8E8282;text-decoration:underline;">wind.suzukihiro.tw 搭乘教學</a><br>• 🕐 時刻表：<a href="https://keisei.ekitan.com/naritaacs/T5?uid=23117&dir=50&path=20240809184650315&USR=PC&dw=0&slCode=682-7&d=1&rsf=" target="_blank" style="color:#8E8282;text-decoration:underline;">點此查看完整時刻表</a><br><br><b>🗺 路線圖</b><br><img src="https://www.keisei.co.jp/keisei/tetudou/skyliner/tc/assets/images/top/routemap_express.jpg" class="w-full rounded-xl mt-2" alt="京成 Access 特快路線圖"><br><br><b>🕐 班次表</b><br><img src="https://img.gototravel.tw/flickr/44553130261_1dbd56ffc2_z.jpg" class="w-full rounded-xl mt-2" alt="京成 Access 特快班次表">', false, 'https://maps.google.com/?q=成田空港第2ビル駅')}
                    ${createCard('入住住宿', '🏨 格拉斯麗淺草酒店', 'Hotel Gracery Asakusa', 'https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?q=80&w=800&auto=format&fit=crop', '• 淺草地區晚間有很多宵夜可以選擇。<br>• 飯店環境新且便利。<br><br><b>🗺 周邊地圖</b><br><img src="https://d2ile4x3f22snf.cloudfront.net/wp-content/uploads/sites/265/2016/10/05063501/chart_zh_tw_asakusa_gwh.jpg" class="w-full rounded-xl mt-2" alt="格拉斯麗淺草酒店周邊地圖">', false, 'https://maps.google.com/?q=Hotel+Gracery+Asakusa')}
                    ${createCard('周邊景點', '🏮 淺草周邊散策', '雷門・仲見世通・淺草寺', 'https://mimigo.tw/wp-content/uploads/20231208143150_0.jpeg', '• 雷門是淺草最著名的地標，夜晚亮燈後非常漂亮。<br>• 仲見世通是日本最古老的商店街之一，可以買伴手禮。<br>• 淺草寺是東京最古老的寺廟，建議早晨或夜晚前往人較少。', false, 'https://maps.google.com/?q=浅草寺')}
                </div>`;
        }

        function renderDay2(container) {
            container.innerHTML = `
                <div class="relative">
                    <div class="timeline-line"></div>
                    <div class="mb-8 pl-10"><h2 class="text-2xl font-bold text-gray-800">Day 2 富士周遊包車</h2></div>
                    ${createWeatherBanner('富士山區', '☀️', '晴、早晚易結霜', 8, -1, 10, '必備手套＋暖暖包，比東京冷 5°C', { percent: 78, label: '能見度高，全貌清晰可見', note: '3月晴天最佳觀賞時機，上午視野最清朗' })}
                    ${createCard('08:00 出發', '🚗 包車接送', '從淺草格拉斯麗酒店出發', 'https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?q=80&w=800&auto=format&fit=crop', '<span class="text-red-500 font-bold">⚠️ 重要提醒：</span><br>• 今日需支付司機<b>尾款 48,000 日幣</b> (限現金)。<br>• 建議提早 10 分鐘在飯店大廳會合。', true, 'https://maps.google.com/?q=Hotel+Gracery+Asakusa')}

        }

        function editWishlistItem(index) {
            const items = JSON.parse(localStorage.getItem('wishlist') || '[]');
            const item = items[index];
            editingWishlistIndex = index;
            document.getElementById('wishlist-modal-title').textContent = '編輯願望清單';
            document.getElementById('wishlist-name').value = item.name;
            document.getElementById('wishlist-location').value = item.location || '';
            if (item.imgSrc) {
                const preview = document.getElementById('wishlist-preview');
                preview.src = item.imgSrc;
                preview.classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            }
            document.getElementById('wishlist-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeWishlistModal() {
            editingWishlistIndex = -1;
            document.getElementById('wishlist-modal-title').textContent = '新增願望清單';
            document.getElementById('wishlist-modal').classList.add('hidden');
            document.body.style.overflow = '';
            const nameInput = document.getElementById('wishlist-name');
            nameInput.value = '';
            nameInput.style.borderColor = '';
            nameInput.style.backgroundColor = '';
            const errMsg = document.getElementById('wishlist-name-error');
            if (errMsg) errMsg.classList.add('hidden');
            document.getElementById('wishlist-location').value = '';
            document.getElementById('wishlist-preview').src = '';
            document.getElementById('wishlist-preview').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
            document.getElementById('img-input').value = '';
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('wishlist-preview');
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function saveWishlistItem() {
            const nameInput = document.getElementById('wishlist-name');
            const name = nameInput.value.trim();
            const location = document.getElementById('wishlist-location').value.trim();
            const preview = document.getElementById('wishlist-preview');
            const imgSrc = preview.classList.contains('hidden') ? '' : preview.src;

            if (!name) {
                nameInput.focus();
                nameInput.style.borderColor = '#EF4444';
                nameInput.style.backgroundColor = '#FFF5F5';
                const errMsg = document.getElementById('wishlist-name-error');
                if (errMsg) errMsg.classList.remove('hidden');
                setTimeout(() => {
                    nameInput.style.borderColor = '';
                    nameInput.style.backgroundColor = '';
                    if (errMsg) errMsg.classList.add('hidden');
                }, 2500);
                return;
            }

            try {
                const items = JSON.parse(localStorage.getItem('wishlist') || '[]');
                if (editingWishlistIndex >= 0) {
                    items[editingWishlistIndex] = { name, location, imgSrc };
                } else {
                    items.push({ name, location, imgSrc });
                }
                localStorage.setItem('wishlist', JSON.stringify(items));
                closeWishlistModal();
                if (currentSection === 'shopping') {
                    renderShopping(document.getElementById('content-area'));
                }
            } catch (e) {
                alert('儲存失敗，請確認瀏覽器是否允許儲存，或圖片檔案是否過大。');
            }
        }

        function deleteWishlistItem(index) {
            const items = JSON.parse(localStorage.getItem('wishlist') || '[]');
            items.splice(index, 1);
            localStorage.setItem('wishlist', JSON.stringify(items));
            renderShopping(document.getElementById('content-area'));
        }

                                    <div style="flex:1;height:1.5px;background:rgba(255,255,255,0.25);"></div>

                        <div style="position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--bg-cream);z-index:2;"></div>
                        <div style="border-top:2px dashed rgba(255,255,255,0.25);margin:0 20px;"></div>
                    </div>

                    <!-- bottom info -->
                    <div style="padding:16px 22px 20px 22px;">
                        <div style="display:flex;justify-content:space-between;align-items:flex-end;">
                            <div>
                                <div style="font-size:9px;opacity:0.5;margin-bottom:4px;letter-spacing:1px;">DEPARTURE</div>
                                <div style="font-size:28px;font-weight:800;line-height:1;">${dep}</div>
                            </div>
                            <div style="text-align:center;">
                                <div style="font-size:9px;opacity:0.5;margin-bottom:4px;letter-spacing:1px;">DATE</div>
                                <div style="font-size:13px;font-weight:700;">${date}</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:9px;opacity:0.5;margin-bottom:4px;letter-spacing:1px;">ARRIVAL</div>
                                <div style="font-size:28px;font-weight:800;line-height:1;">${arr}</div>

                        </div>
                        ${driveUrl ? `<a href="${driveUrl}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;background:rgba(255,255,255,0.15);border-radius:12px;padding:10px;font-size:12px;font-weight:600;color:white;text-decoration:none;">📄 查看電子機票原檔</a>` : ''}
                    </div>
                </div>`;

            container.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">票券整理 🎫</h2>

                    <!-- Flight Tickets -->
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">✈️ 機票</h3>
                    ${ticketCard('去程', 'linear-gradient(135deg, #1a3a5c 0%, #2563a8 100%)', 'TPE', '台北桃園', '第二航廈', 'NRT', '東京成田', '第二航廈', 'CI106', '16:25', '20:25', 'MAR 4, 2026', 'https://drive.google.com/file/d/1m9NmXqjG0ZKFG5Z85gBe584DYmsSiH5U/view?usp=sharing')}
                    ${ticketCard('回程', 'linear-gradient(135deg, #5b2d8e 0%, #c2185b 100%)', 'NRT', '東京成田', '第二航廈', 'TPE', '台北桃園', '第二航廈', 'CI107', '09:20', '12:20', 'MAR 9, 2026', 'https://drive.google.com/file/d/1FE3AaxojWRF6dvLU0Ka3IdDgQXKSr21_/view?usp=sharing')}

                    <!-- Other Tickets -->
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 mt-2">🎟️ 其他票券</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-red-50 rounded-card shadow-card p-6 border border-red-100">
                        <h3 class="font-bold text-red-700">🚗 包車尾款 ¥48,000 (現金)</h3>
                        <p class="text-red-600 text-sm mt-1">3/5 使用。請確保現金充足，分開存放更安全。</p>

                    <div class="bg-blue-50 rounded-card shadow-card p-6 border border-blue-100">
                        <h3 class="font-bold text-blue-700">⚾ 棒球賽 & 展覽門票</h3>

                    </div>
                    <div class="bg-indigo-50 rounded-card shadow-card p-6 border border-indigo-100">
                        <h3 class="font-bold text-indigo-700">🚌 利木津巴士 (Limousine)</h3>
                        <p class="text-indigo-600 text-sm mt-1">3/9 使用。請提早跟飯店櫃台預約座位。</p>
                    </div>
                    </div>

                    <!-- Game Schedule -->
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 mt-6">⚾ 賽程表</h3>
                    <div class="bg-white rounded-card shadow-card border border-gray-100 overflow-hidden fade-in">
                        <img src="https://lh3.googleusercontent.com/d/1sko9gi6SWY9OgAr2xuzGckzFwV6w8u_c" class="w-full" alt="賽程表">
                    </div>
                </div>`;
        }
    </script>
</body>
